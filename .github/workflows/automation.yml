# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Triggers the workflow on a schedule (Wednesdays and Fridays at 12:15 AM local time)
  schedule:
    # 1. Summer Schedule (BST): Local 12:15 AM is 23:15 UTC (the previous day)
    - cron: '15 23 * 4-10 2,4'
    
    # 2. Winter Schedule (GMT): Local 12:15 AM is 00:15 UTC
    - cron: '15 0 * 1-3,11-12 3,5'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 3. Install playwright browsers
      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      # 4. Run the Python script immediately (No delays needed!)
      - name: Run Python Script
        env:
          MY_USERNAME: ${{ secrets.PILATES_USERNAME }}
          MY_PASSWORD: ${{ secrets.PILATES_PASSWORD }}
        run: python main.py
