# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Triggers the workflow on a schedule (Wednesdays and Fridays at 00:00 UTC)
  schedule:
    # 1. Summer Schedule (BST): Runs at 22:30 UTC from April 1st to October 31st
    - cron: '30 22 * 4-10 3,5'
    
    # 2. Winter Schedule (GMT): Runs at 23:30 UTC from November 1st to March 31st
    - cron: '30 23 * 1-3,11-12 3,5'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4

      # 1. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. Install dependencies (Optional: remove if you don't use a requirements.txt)
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 3. Install playwright browsers
      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      # 4. Run the Python script
      - name: Run Python Script
        env:
          MY_USERNAME: ${{ secrets.PILATES_USERNAME }}
          MY_PASSWORD: ${{ secrets.PILATES_PASSWORD }}
        run: python main.py
