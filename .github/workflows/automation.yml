# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Triggers the workflow on a schedule (Tuesdays and Thursdays at 22:15 PM local time)
  schedule:
    # 1. Summer Schedule (BST): Local 22:15 PM is 21:15 UTC
    - cron: '15 21 * 4-10 2,4'
    
    # 2. Winter Schedule (GMT): Local 22:15 PM is 22:15 UTC
    - cron: '15 22 * 1-3,11-12 2,4'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. Install Python dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 3. Smart Cache: Check if we already downloaded the browser previously
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # The key ensures the cache refreshes if you change your Python requirements
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # 4. Install the Chromium browser binary ONLY if the cache missed
      - name: Install Playwright Chromium Browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      # 5. Fast-install just the Linux OS system packages needed for Chromium
      - name: Install Playwright OS Dependencies
        run: playwright install-deps chromium

      # 4. Run the Python script
      - name: Run Python Script
        env:
          MY_USERNAME: ${{ secrets.PILATES_USERNAME }}
          MY_PASSWORD: ${{ secrets.PILATES_PASSWORD }}
          MY_TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
          MY_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python booking.py
      
      #Failure step
      - name: Send Global Workflow Failure Notification
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_API_KEY}}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="❌ <b>GitHub Action Workflow Failed!</b>"
          MESSAGE+=$'\n'"<b>Run ID:</b> ${{ github.run_id }}"
          MESSAGE+=$'\n'"<b>Link:</b> <a href=\"$RUN_URL\">Click Here to View Log</a>"
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MESSAGE}"
